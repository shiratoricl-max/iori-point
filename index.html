<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>伊織専用ポイントカード</title>
  <style>
    :root {
      --bg: #fff8ef;
      --card: #ffffff;
      --text: #2d2a26;
      --muted: #7a6e63;
      --accent: #ffb703;
      --accent-2: #fb8500;
      --good: #2a9d8f;
      --danger: #d62828;
      --line: #eadfce;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --radius: 20px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: linear-gradient(180deg, #fff8ef 0%, #fff1dc 100%);
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 18px 16px 32px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 16px;
    }

    .title {
      font-size: 1.55rem;
      font-weight: 800;
      text-align: center;
      margin: 10px 0 18px;
      line-height: 1.35;
    }

    .muted {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .points-wrap {
      text-align: center;
      padding: 18px 10px;
    }

    .points-label {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .points-value {
      font-size: 3.1rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
    }

    .points-unit {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .sub-status {
      margin-top: 10px;
      font-size: 1rem;
      font-weight: 700;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      background: var(--accent);
      color: #3a2b00;
      box-shadow: var(--shadow);
    }

    button.secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    button.accent2 { background: var(--accent-2); color: #fff; }
    button.good { background: var(--good); color: #fff; }
    button.danger { background: var(--danger); color: #fff; }
    button.ghost {
      background: transparent;
      color: var(--muted);
      border: 1px dashed var(--line);
      box-shadow: none;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stack { display: grid; gap: 10px; }

    .section-title {
      font-size: 1rem;
      font-weight: 800;
      margin: 0 0 12px;
    }

    .reward-item,
    .history-item,
    .action-item,
    .setting-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: #fffdfa;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .row-start {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .reward-name,
    .history-title,
    .action-name,
    .setting-name {
      font-weight: 800;
      margin-bottom: 4px;
    }

    .pill {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      background: #fff3cd;
      color: #7a5600;
    }

    .pill.ok { background: #dff6f2; color: #176d63; }
    .pill.off { background: #f1f1f1; color: #666; }
    .pill.weekly { background: #e7f0ff; color: #2454a6; }

    .small {
      font-size: 0.88rem;
      color: var(--muted);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-size: 1rem;
      background: #fff;
      font-family: inherit;
    }

    .pin-dots {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .pin-dot {
      height: 54px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.4rem;
      font-weight: 900;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .keypad button {
      height: 58px;
      font-size: 1.2rem;
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
    }

    .nav-title {
      font-size: 1.15rem;
      font-weight: 900;
    }

    .mini-btn {
      width: auto;
      padding: 10px 12px;
      font-size: 0.92rem;
      border-radius: 12px;
      box-shadow: none;
    }

    .footer-note {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 12px;
    }

    .hidden-entry {
      margin-top: 8px;
      text-align: center;
    }

    .hidden-entry button {
      width: auto;
      padding: 8px 12px;
      background: transparent;
      border: 1px dashed transparent;
      color: #b6aa9c;
      font-size: 0.78rem;
      box-shadow: none;
    }

    .flash {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 999;
    }

    .flash.show { display: flex; }

    .flash-bubble {
      background: rgba(42, 157, 143, 0.95);
      color: #fff;
      padding: 18px 24px;
      border-radius: 999px;
      font-size: 1.6rem;
      font-weight: 900;
      transform: scale(0.8);
      animation: pop 0.8s ease forwards;
      text-align: center;
    }

    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      20% { transform: scale(1.05); opacity: 1; }
      80% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1); opacity: 0; }
    }

    .danger-text { color: var(--danger); font-weight: 700; }
    .success-panel {
      text-align: center;
      padding: 18px 10px;
    }

    .success-title {
      font-size: 1.4rem;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .action-preview {
      display: grid;
      gap: 8px;
    }

    @media (max-width: 420px) {
      .points-value { font-size: 2.7rem; }
      .title { font-size: 1.35rem; }
      .grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section id="screen-main" class="screen active">
      <div class="card">
        <div class="title" id="childTitle">黒田伊織ポイントカード</div>
        <div class="points-wrap">
          <div class="points-label">いまのポイント</div>
          <div>
            <span class="points-value" id="mainPoints">0</span>
            <span class="points-unit">pt</span>
          </div>
                    <div id="weeklyBonusArea" style="margin-top:8px;"></div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">ポイントがもらえること</div>
        <div id="childActionList" class="stack"></div>
      </div>

      <div class="stack">
        <button id="openRewardsBtn">ごほうびリスト</button>
      </div>

      <div class="hidden-entry">
        <button id="openPinBtn" aria-label="管理画面">管理画面</button>
      </div>

      <div class="footer-note"></div>
    </section>

    <section id="screen-rewards" class="screen">
      <div class="top-nav">
        <button class="secondary mini-btn" data-back="main">← もどる</button>
        <div class="nav-title">ごほうびリスト</div>
        <div style="width:72px"></div>
      </div>

      <div class="card">
        <div class="section-title">いつでも交換できる報酬</div>
        <div id="rewardListNone" class="stack"></div>
      </div>

      <div class="card">
        <div class="section-title">週1の報酬</div>
        <div id="rewardListWeekly" class="stack"></div>
      </div>
    </section>

    <section id="screen-pin" class="screen">
      <div class="top-nav">
        <button class="secondary mini-btn" data-pin-back="main">← もどる</button>
        <div class="nav-title" id="pinScreenTitle"></div>
        <div style="width:72px"></div>
      </div>

      <div class="card">
        <div id="pinTargetSummary" class="small" style="margin-bottom:12px;"></div>
        <div class="section-title">4桁PINを入力</div>
        <div class="pin-dots" id="pinDots"></div>
        <div class="keypad" id="keypad"></div>
        <div class="small" id="pinMessage" style="margin-top:12px;"></div>
      </div>
    </section>

    <section id="screen-receive" class="screen">
      <div class="top-nav">
        <button class="secondary mini-btn" id="receiveBackBtn">← もどる</button>
        <div class="nav-title">受け取り</div>
        <div style="width:72px"></div>
      </div>
      <div class="card success-panel">
        <div class="success-title">交換できました</div>
        <div id="receiveSummary" class="small" style="margin-bottom:16px;"></div>
        <button id="receiveDoneBtn" class="good">受け取った</button>
      </div>
    </section>

    <section id="screen-admin" class="screen">
      <div class="top-nav">
        <button class="secondary mini-btn" id="adminBackBtn">← 終了</button>
        <div class="nav-title">親管理画面</div>
        <div style="width:72px"></div>
      </div>

      <div class="card">
        <div class="section-title">定型加点</div>
        <div id="actionButtons" class="stack"></div>
      </div>

      <div class="card">
        <div class="section-title">手動調整</div>
        <div class="stack">
          <input id="customMemo" type="text" placeholder="内容メモ（例：おふろそうじ）" />
          <div class="grid-2">
            <input id="customPoints" type="number" inputmode="numeric" placeholder="pt" />
            <select id="customMode">
              <option value="add">加点</option>
              <option value="subtract">減点</option>
            </select>
          </div>
          <button id="applyCustomBtn" class="accent2">反映する</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">報酬交換</div>
        <div id="adminRewardList" class="stack"></div>
      </div>

      <div class="card">
        <div class="section-title">加点項目の管理</div>
        <div id="actionSettingsList" class="stack"></div>
        <div class="setting-item" style="margin-top:10px;">
          <div class="grid-2">
            <input id="newActionName" type="text" placeholder="項目名" />
            <input id="newActionPoints" type="number" inputmode="numeric" placeholder="pt" />
          </div>
          <button id="addActionBtn" class="secondary" style="margin-top:10px;">加点項目を追加</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">報酬項目の管理</div>
        <div id="rewardSettingsList" class="stack"></div>
        <div class="setting-item" style="margin-top:10px;">
          <div class="stack">
            <input id="newRewardName" type="text" placeholder="報酬名" />
            <div class="grid-2">
              <input id="newRewardCost" type="number" inputmode="numeric" placeholder="必要pt" />
              <select id="newRewardLimit">
                <option value="none">none</option>
                <option value="weekly">weekly</option>
              </select>
            </div>
            <input id="newRewardNote" type="text" placeholder="説明文" />
            <button id="addRewardBtn" class="secondary">報酬項目を追加</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">PIN変更</div>
        <div class="stack">
          <div class="grid-2">
            <input id="newPinInput" type="password" inputmode="numeric" maxlength="4" placeholder="新しい4桁PIN" />
            <input id="confirmPinInput" type="password" inputmode="numeric" maxlength="4" placeholder="確認用4桁PIN" />
          </div>
          <button id="savePinBtn" class="secondary">PINを変更</button>
          <div class="small">半角数字4桁のみ</div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">バックアップ</div>
        <div class="stack">
          <div class="grid-2">
            <button id="exportBtn" class="secondary">バックアップ出力</button>
            <button id="importBtn" class="secondary">バックアップ読込</button>
          </div>
          <input id="importFile" type="file" accept="application/json" style="display:none;" />
        </div>
      </div>
<div class="card">
  <div class="section-title">初期化</div>
  <div class="stack">
    <button id="resetAllBtn" class="danger">全部初期化</button>
    <div class="small">ポイント・履歴・報酬・加点項目・PINを初期状態に戻します</div>
  </div>
</div>
      <div class="card">
        <div class="section-title">最近の履歴</div>
        <div id="historyList" class="stack"></div>
      </div>
    </section>
  </div>

  <div id="flash" class="flash">
    <div class="flash-bubble" id="flashText">+5pt</div>
  </div>

  <script>
    const STORAGE_KEY = 'family-points-card-v2';

    const defaultData = {
      childName: '伊織',
      pin: '1234',
      points: 0,
      weeklyBonusPoints: 100,
lastWeeklyBonusClaimWeekKey: null,
      rewards: [
        { id: 'sticker', name: 'シール', cost: 15, limit: 'none', note: '何回でも交換OK' },
        { id: 'snack', name: 'おやつ', cost: 30, limit: 'none', note: '何回でも交換OK' },
        { id: 'allowance', name: 'おこづかい', cost: 100, limit: 'weekly', note: '700円 / 週1回ボーナス相当' }
      ],
      actions: [
        { id: 'kind', name: 'やさしいこと', points: 2 },
        { id: 'help', name: 'おてつだい', points: 5 },
        { id: 'study', name: 'がんばった', points: 10 },
        { id: 'bonus', name: 'とくべつボーナス', points: 20 }
      ],
      history: []
    };

    let state = structuredClone(defaultData);
    state.childName = '伊織';
    let enteredPin = '';
    let pendingRewardId = null;
    let pinMode = 'admin';
    let lastRedeemedReward = null;

    const el = {
      screens: {
        main: document.getElementById('screen-main'),
        rewards: document.getElementById('screen-rewards'),
        pin: document.getElementById('screen-pin'),
        receive: document.getElementById('screen-receive'),
        admin: document.getElementById('screen-admin')
      },
      childTitle: document.getElementById('childTitle'),
      mainPoints: document.getElementById('mainPoints'),
      nextRewardText: document.getElementById('nextRewardText'),
      weeklyBonusArea: document.getElementById('weeklyBonusArea'),
      childActionList: document.getElementById('childActionList'),
      rewardListNone: document.getElementById('rewardListNone'),
      rewardListWeekly: document.getElementById('rewardListWeekly'),
      adminRewardList: document.getElementById('adminRewardList'),
      actionButtons: document.getElementById('actionButtons'),
      actionSettingsList: document.getElementById('actionSettingsList'),
      rewardSettingsList: document.getElementById('rewardSettingsList'),
      historyList: document.getElementById('historyList'),
      openRewardsBtn: document.getElementById('openRewardsBtn'),
      openPinBtn: document.getElementById('openPinBtn'),
      pinDots: document.getElementById('pinDots'),
      keypad: document.getElementById('keypad'),
      pinMessage: document.getElementById('pinMessage'),
      pinTargetSummary: document.getElementById('pinTargetSummary'),
      pinScreenTitle: document.getElementById('pinScreenTitle'),
      adminBackBtn: document.getElementById('adminBackBtn'),
      customMemo: document.getElementById('customMemo'),
      customPoints: document.getElementById('customPoints'),
      customMode: document.getElementById('customMode'),
      applyCustomBtn: document.getElementById('applyCustomBtn'),
      newActionName: document.getElementById('newActionName'),
      newActionPoints: document.getElementById('newActionPoints'),
      addActionBtn: document.getElementById('addActionBtn'),
      newRewardName: document.getElementById('newRewardName'),
      newRewardCost: document.getElementById('newRewardCost'),
      newRewardLimit: document.getElementById('newRewardLimit'),
      newRewardNote: document.getElementById('newRewardNote'),
      addRewardBtn: document.getElementById('addRewardBtn'),
      newPinInput: document.getElementById('newPinInput'),
      confirmPinInput: document.getElementById('confirmPinInput'),
      savePinBtn: document.getElementById('savePinBtn'),
      exportBtn: document.getElementById('exportBtn'),
      importBtn: document.getElementById('importBtn'),
      importFile: document.getElementById('importFile'),
resetAllBtn: document.getElementById('resetAllBtn'),
      receiveSummary: document.getElementById('receiveSummary'),
      receiveDoneBtn: document.getElementById('receiveDoneBtn'),
      receiveBackBtn: document.getElementById('receiveBackBtn'),
      flash: document.getElementById('flash'),
      flashText: document.getElementById('flashText')
    };

    init();

    async function init() {
  state = await loadState();
  state.childName = '伊織';
  applyWeeklyBonusIfNeeded();
  buildKeypad();
  bindEvents();
  renderAll();
}

    async function loadState() {
  try {
    const res = await fetch('/.netlify/functions/get-state');
    if (!res.ok) throw new Error('load failed');

    const parsed = await res.json();
    return normalizeState(parsed);
  } catch (e) {
    return structuredClone(defaultData);
  }
}

    function normalizeState(parsed) {
      return {
        ...structuredClone(defaultData),
        ...parsed,
        childName: '伊織',
        rewards: Array.isArray(parsed.rewards) ? parsed.rewards.map(normalizeReward).filter(Boolean) : structuredClone(defaultData.rewards),
        actions: Array.isArray(parsed.actions) ? parsed.actions.map(normalizeAction).filter(Boolean) : structuredClone(defaultData.actions),
        history: Array.isArray(parsed.history) ? parsed.history : []
      };
    }

    function normalizeReward(item) {
      if (!item || typeof item !== 'object') return null;
      return {
        id: item.id || cryptoId(),
        name: String(item.name || '').trim() || '報酬',
        cost: Math.max(0, Number(item.cost || 0)),
        limit: item.limit === 'weekly' ? 'weekly' : 'none',
        note: String(item.note || '')
      };
    }

    function normalizeAction(item) {
      if (!item || typeof item !== 'object') return null;
      return {
        id: item.id || cryptoId(),
        name: String(item.name || '').trim() || '加点項目',
        points: Math.max(0, Number(item.points || 0))
      };
    }

    async function saveState() {
  state.childName = '伊織';

  try {
    await fetch('/.netlify/functions/save-state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    });
  } catch (e) {
    console.error('save failed', e);
  }
}

    function structuredClone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function bindEvents() {
      el.openRewardsBtn.addEventListener('click', () => showScreen('rewards'));
      el.openPinBtn.addEventListener('click', () => openPinForAdmin());

      document.querySelectorAll('[data-back="main"]').forEach(btn => {
        btn.addEventListener('click', () => showScreen('main'));
      });
      document.querySelectorAll('[data-pin-back="main"]').forEach(btn => {
        btn.addEventListener('click', () => {
          resetPinInput();
          pendingRewardId = null;
          showScreen('main');
        });
      });

      el.adminBackBtn.addEventListener('click', () => showScreen('main'));
      el.applyCustomBtn.addEventListener('click', applyCustomChange);
      el.addActionBtn.addEventListener('click', addNewAction);
      el.addRewardBtn.addEventListener('click', addNewReward);
      el.savePinBtn.addEventListener('click', saveNewPin);
      el.exportBtn.addEventListener('click', exportBackup);
      el.importBtn.addEventListener('click', () => el.importFile.click());
      el.importFile.addEventListener('change', importBackup);
el.resetAllBtn.addEventListener('click', resetAllData);
      el.receiveDoneBtn.addEventListener('click', completeReceiveFlow);
      el.receiveBackBtn.addEventListener('click', completeReceiveFlow);
    }

    function showScreen(name) {
      Object.values(el.screens).forEach(screen => screen.classList.remove('active'));
      el.screens[name].classList.add('active');
      if (name === 'admin') renderAdmin();
      if (name === 'rewards') renderRewards();
      if (name === 'main') renderMain();
      if (name === 'pin') renderPin();
      if (name === 'receive') renderReceive();
    }

    function openPinForAdmin() {
      pinMode = 'admin';
      pendingRewardId = null;
      resetPinInput();
      el.pinScreenTitle.textContent = '';
      el.pinTargetSummary.textContent = '親管理画面に入ります';
      showScreen('pin');
    }

    function openPinForReward(rewardId) {
      const reward = state.rewards.find(r => r.id === rewardId);
      if (!reward) return;
      pinMode = 'reward';
      pendingRewardId = rewardId;
      resetPinInput();
      el.pinScreenTitle.textContent = '交換の確認';
      el.pinTargetSummary.textContent = `交換する報酬：${reward.name} / ${reward.cost}pt`;
      el.pinMessage.textContent = 'この内容で交換するときはPINを入力';
      showScreen('pin');
    }

    function resetPinInput() {
      enteredPin = '';
      updatePinDots();
      el.pinMessage.textContent = '';
    }

    function getTodayIso() {
      return new Date().toISOString();
    }

    function getWeekKey(date = new Date()) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2, '0')}`;
    }

    function applyWeeklyBonusIfNeeded() {
  // 自動付与はしない
}

    function renderAll() {
      renderMain();
      renderRewards();
      renderAdmin();
      renderPin();
      renderReceive();
    }

    function renderMain() {
      el.childTitle.textContent = '🐈伊織専用ポイントカード🐈';
      el.mainPoints.textContent = state.points;
      renderWeeklyBonusArea();
      renderChildActions();
    }

    function renderChildActions() {
      el.childActionList.innerHTML = '';
      if (!state.actions.length) {
        const empty = document.createElement('div');
        empty.className = 'small';
        empty.textContent = 'まだ加点項目がありません';
        el.childActionList.appendChild(empty);
        return;
      }
      state.actions.forEach(action => {
        const item = document.createElement('div');
        item.className = 'action-item';
        item.innerHTML = `
          <div class="row">
            <div class="action-name">${escapeHtml(action.name)}</div>
            <div class="pill ok">+${action.points}pt</div>
          </div>
        `;
        el.childActionList.appendChild(item);
      });
    }

    function buildNextRewardText() {
      const affordable = state.rewards
        .filter(r => state.points >= r.cost)
        .sort((a, b) => a.cost - b.cost);
      if (affordable.length > 0) {
        return `${affordable[0].name}`;
      }
      const next = state.rewards.slice().sort((a, b) => a.cost - b.cost)[0];
      if (!next) return 'ごほうびを設定してください';
      const diff = Math.max(0, next.cost - state.points);
      return `あと${diff}ptで ${next.name}`;
    }


function isWeeklyBonusAvailable(date = new Date()) {
  const currentWeekKey = getWeekKey(date);
  const isMondayOrLater = date.getDay() >= 1;
  return isMondayOrLater && state.lastWeeklyBonusClaimWeekKey !== currentWeekKey;
}

function claimWeeklyBonus() {
  if (!isWeeklyBonusAvailable()) return;

  const bonusPoints = Number(state.weeklyBonusPoints || 100);

  if (!confirm(`今週のボーナス ${bonusPoints}pt を受け取りますか？`)) {
    return;
  }

  const weekKey = getWeekKey(new Date());

  state.points += bonusPoints;
  state.lastWeeklyBonusClaimWeekKey = weekKey;

  state.history.unshift({
    id: cryptoId(),
    type: 'weekly_bonus',
    title: '今週のボーナスGET',
    points: bonusPoints,
    createdAt: getTodayIso(),
    meta: { weekKey }
  });

  trimHistory();
  saveState();
  renderAll();
  showFlash(`+${bonusPoints}pt`);
}

function renderWeeklyBonusArea() {
  el.weeklyBonusArea.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.className = 'reward-item';

  if (isWeeklyBonusAvailable()) {
    const note = document.createElement('div');
    note.className = 'small';
    note.style.marginBottom = '10px';
    note.textContent = '月曜日にGETできます';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'accent2';
    btn.textContent = '今週のボーナスGET';
    btn.addEventListener('click', claimWeeklyBonus);

    wrap.appendChild(note);
    wrap.appendChild(btn);
  } else {
    wrap.innerHTML = `
      <div class="row">
        <div class="small">✓ 今週は受け取り済み</div>
        <div class="pill weekly">${Number(state.weeklyBonusPoints || 100)}pt</div>
      </div>
    `;
  }

  el.weeklyBonusArea.appendChild(wrap);
}
function canRedeemWeeklyReward(reward) {
  if (!reward || reward.limit !== 'weekly') return true;

  const weekKey = getWeekKey(new Date());

  return !state.history.some(item => {
    return item.type === 'redeem'
      && item.meta
      && item.meta.rewardId === reward.id
      && item.meta.weekKey === weekKey;
  });
}
    function renderRewards() {
      el.rewardListNone.innerHTML = '';
      el.rewardListWeekly.innerHTML = '';

      state.rewards.forEach(reward => {
        const canAfford = state.points >= reward.cost;
const weeklyAllowed = canRedeemWeeklyReward(reward);
        const item = document.createElement('div');
        item.className = 'reward-item';
        item.innerHTML = `
          <div class="row-start">
            <div>
              <div class="reward-name">${escapeHtml(reward.name)}</div>
              <div class="small">${escapeHtml(reward.note || '')}</div>
            </div>
            <div style="text-align:right;">
              <div class="pill ${reward.limit === 'weekly' ? 'weekly' : ''}">${reward.cost}pt</div>
            </div>
          </div>
          <div class="row" style="margin-top:10px;">
            <div class="small">${
  reward.limit === 'weekly' && !weeklyAllowed
    ? '今週は交換済み'
    : (canAfford ? 'いま交換できます' : `あと${reward.cost - state.points}pt`)
}</div>
            <button class="mini-btn ${canAfford && weeklyAllowed ? 'good' : 'secondary'}" data-request-reward="${reward.id}" ${canAfford && weeklyAllowed ? '' : 'disabled'}>
              ${canAfford && weeklyAllowed ? '交換したい' : 'まだ交換できない'}
            </button>
          </div>
        `;
        item.querySelector('[data-request-reward]')?.addEventListener('click', () => openPinForReward(reward.id));
        if (reward.limit === 'weekly') {
          el.rewardListWeekly.appendChild(item);
        } else {
          el.rewardListNone.appendChild(item);
        }
      });
    }

    function renderAdmin() {
      renderActionButtons();
      renderAdminRewards();
      renderHistory();
      renderActionSettings();
      renderRewardSettings();
    }

    function renderActionButtons() {
      el.actionButtons.innerHTML = '';
      if (!state.actions.length) {
        const empty = document.createElement('div');
        empty.className = 'small';
        empty.textContent = '加点項目を追加してください';
        el.actionButtons.appendChild(empty);
        return;
      }
      state.actions.forEach(action => {
        const wrap = document.createElement('div');
        wrap.className = 'action-item';
        const btn = document.createElement('button');
        btn.className = 'good';
        btn.textContent = `${action.name} +${action.points}pt`;
        btn.addEventListener('click', () => addPoints(action.points, action.name));
        wrap.appendChild(btn);
        el.actionButtons.appendChild(wrap);
      });
    }

    function renderAdminRewards() {
      el.adminRewardList.innerHTML = '';
      if (!state.rewards.length) {
        const empty = document.createElement('div');
        empty.className = 'small';
        empty.textContent = '報酬項目を追加してください';
        el.adminRewardList.appendChild(empty);
        return;
      }
      state.rewards.forEach(reward => {
        const canAfford = state.points >= reward.cost;
const weeklyAllowed = canRedeemWeeklyReward(reward);
        const item = document.createElement('div');
        item.className = 'reward-item';
        item.innerHTML = `
          <div class="row-start">
            <div>
              <div class="reward-name">${escapeHtml(reward.name)}</div>
              <div class="small">${escapeHtml(reward.note || '')}</div>
            </div>
            <div class="pill ${reward.limit === 'weekly' ? 'weekly' : ''}">${reward.cost}pt</div>
          </div>
          <div class="row" style="margin-top:10px;">
            <div class="small">${
  reward.limit === 'weekly' && !weeklyAllowed
    ? '今週は交換済み'
    : (canAfford ? '交換可能' : `残り${reward.cost - state.points}pt必要`)
}</div>
            <button class="mini-btn ${canAfford && weeklyAllowed ? 'accent2' : 'secondary'}" ${canAfford && weeklyAllowed ? '' : 'disabled'} data-admin-reward="${reward.id}">交換確定</button>
          </div>
        `;
        item.querySelector('[data-admin-reward]')?.addEventListener('click', () => {
          lastRedeemedReward = redeemReward(reward.id);
          if (lastRedeemedReward) {
            showScreen('receive');
          }
        });
        el.adminRewardList.appendChild(item);
      });
    }

    function renderActionSettings() {
      el.actionSettingsList.innerHTML = '';
      state.actions.forEach(action => {
        const item = document.createElement('div');
        item.className = 'setting-item';
        item.innerHTML = `
          <div class="grid-3">
            <input value="${escapeAttribute(action.name)}" data-action-name="${action.id}" />
            <input type="number" inputmode="numeric" value="${action.points}" data-action-points="${action.id}" />
            <button class="danger mini-btn" data-delete-action="${action.id}">削除</button>
          </div>
        `;
        item.querySelector(`[data-action-name="${cssEscape(action.id)}"]`).addEventListener('change', (e) => updateAction(action.id, { name: e.target.value }));
        item.querySelector(`[data-action-points="${cssEscape(action.id)}"]`).addEventListener('change', (e) => updateAction(action.id, { points: Number(e.target.value) }));
        item.querySelector(`[data-delete-action="${cssEscape(action.id)}"]`).addEventListener('click', () => deleteAction(action.id));
        el.actionSettingsList.appendChild(item);
      });
    }

    function renderRewardSettings() {
      el.rewardSettingsList.innerHTML = '';
      state.rewards.forEach(reward => {
        const item = document.createElement('div');
        item.className = 'setting-item';
        item.innerHTML = `
          <div class="stack">
            <input value="${escapeAttribute(reward.name)}" data-reward-name="${reward.id}" />
            <div class="grid-2">
              <input type="number" inputmode="numeric" value="${reward.cost}" data-reward-cost="${reward.id}" />
              <select data-reward-limit="${reward.id}">
                <option value="none" ${reward.limit === 'none' ? 'selected' : ''}>none</option>
                <option value="weekly" ${reward.limit === 'weekly' ? 'selected' : ''}>weekly</option>
              </select>
            </div>
            <input value="${escapeAttribute(reward.note || '')}" data-reward-note="${reward.id}" />
            <button class="danger mini-btn" data-delete-reward="${reward.id}">削除</button>
          </div>
        `;
        item.querySelector(`[data-reward-name="${cssEscape(reward.id)}"]`).addEventListener('change', (e) => updateReward(reward.id, { name: e.target.value }));
        item.querySelector(`[data-reward-cost="${cssEscape(reward.id)}"]`).addEventListener('change', (e) => updateReward(reward.id, { cost: Number(e.target.value) }));
        item.querySelector(`[data-reward-limit="${cssEscape(reward.id)}"]`).addEventListener('change', (e) => updateReward(reward.id, { limit: e.target.value }));
        item.querySelector(`[data-reward-note="${cssEscape(reward.id)}"]`).addEventListener('change', (e) => updateReward(reward.id, { note: e.target.value }));
        item.querySelector(`[data-delete-reward="${cssEscape(reward.id)}"]`).addEventListener('click', () => deleteReward(reward.id));
        el.rewardSettingsList.appendChild(item);
      });
    }

    function renderHistory() {
      el.historyList.innerHTML = '';
      const items = state.history.slice(0, 20);
      if (items.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'small';
        empty.textContent = '履歴はまだありません';
        el.historyList.appendChild(empty);
        return;
      }
      items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'history-item';
        const pointText = item.points >= 0 ? `+${item.points}pt` : `${item.points}pt`;
        row.innerHTML = `
          <div class="row-start">
            <div>
              <div class="history-title">${escapeHtml(item.title)}</div>
              <div class="small">${formatDate(item.createdAt)}</div>
            </div>
            <div class="pill ${item.points >= 0 ? 'ok' : 'off'}">${pointText}</div>
          </div>
        `;
        el.historyList.appendChild(row);
      });
    }

    function renderPin() {
      updatePinDots();
      if (pinMode === 'admin') {
        el.pinScreenTitle.textContent = '';
        el.pinTargetSummary.textContent = '親管理画面に入ります';
      } else if (pinMode === 'reward' && pendingRewardId) {
        const reward = state.rewards.find(r => r.id === pendingRewardId);
        el.pinScreenTitle.textContent = '交換の確認';
        el.pinTargetSummary.textContent = reward ? `交換する報酬：${reward.name} / ${reward.cost}pt` : '';
      }
    }

    function renderReceive() {
      if (!lastRedeemedReward) {
        el.receiveSummary.textContent = '受け取り内容はありません';
        return;
      }
      el.receiveSummary.textContent = `${lastRedeemedReward.name} を受け取ってください（${lastRedeemedReward.cost}pt使用）`;
    }

    function buildKeypad() {
      el.pinDots.innerHTML = '';
      for (let i = 0; i < 4; i++) {
        const dot = document.createElement('div');
        dot.className = 'pin-dot';
        dot.textContent = '';
        el.pinDots.appendChild(dot);
      }
      const keys = ['1','2','3','4','5','6','7','8','9','クリア','0','けす'];
      el.keypad.innerHTML = '';
      keys.forEach(key => {
        const btn = document.createElement('button');
        btn.textContent = key;
        btn.addEventListener('click', () => handlePinKey(key));
        el.keypad.appendChild(btn);
      });
    }

    function handlePinKey(key) {
      if (key === 'クリア') {
        enteredPin = '';
      } else if (key === 'けす') {
        enteredPin = enteredPin.slice(0, -1);
      } else if (enteredPin.length < 4) {
        enteredPin += key;
      }
      updatePinDots();
      if (enteredPin.length === 4) verifyPin();
    }

    function updatePinDots() {
      [...el.pinDots.children].forEach((dot, index) => {
        dot.textContent = index < enteredPin.length ? '●' : '';
      });
    }

    function verifyPin() {
      if (enteredPin === state.pin) {
        const rewardId = pendingRewardId;
        resetPinInput();
        if (pinMode === 'reward' && rewardId) {
          pendingRewardId = null;
          lastRedeemedReward = redeemReward(rewardId);
          if (lastRedeemedReward) {
            showScreen('receive');
          } else {
            showScreen('main');
          }
        } else {
          showScreen('admin');
        }
      } else {
        enteredPin = '';
        updatePinDots();
        el.pinMessage.innerHTML = '<span class="danger-text">PINが違います</span>';
      }
    }

    function addPoints(points, title) {
      state.points += points;
      state.history.unshift({
        id: cryptoId(),
        type: 'add',
        title,
        points,
        createdAt: getTodayIso()
      });
      trimHistory();
      saveState();
      renderAll();
      showFlash(`+${points}pt`);
    }

    function applyCustomChange() {
      const memo = el.customMemo.value.trim() || '手動調整';
      const value = Number(el.customPoints.value);
      if (!Number.isFinite(value) || value <= 0) return;
      const mode = el.customMode.value;
      const delta = mode === 'subtract' ? -value : value;
      state.points = Math.max(0, state.points + delta);
      state.history.unshift({
        id: cryptoId(),
        type: 'manual',
        title: memo,
        points: delta,
        createdAt: getTodayIso()
      });
      trimHistory();
      saveState();
      el.customMemo.value = '';
      el.customPoints.value = '';
      renderAll();
      showFlash(`${delta > 0 ? '+' : ''}${delta}pt`);
    }

    function redeemReward(rewardId) {
      const reward = state.rewards.find(r => r.id === rewardId);
      if (!reward || state.points < reward.cost) return null;
      state.points -= reward.cost;
      state.history.unshift({
        id: cryptoId(),
        type: 'redeem',
        title: `報酬交換：${reward.name}`,
        points: -reward.cost,
        createdAt: getTodayIso(),
        meta: {
  rewardId,
  weekKey: reward.limit === 'weekly' ? getWeekKey(new Date()) : null
}
      });
      trimHistory();
      saveState();
      renderAll();
      showFlash(`${reward.name} 交換`);
      return reward;
    }

    function completeReceiveFlow() {
      lastRedeemedReward = null;
      showScreen('main');
    }

    function addNewAction() {
      const name = el.newActionName.value.trim();
      const points = Number(el.newActionPoints.value);
      if (!name || !Number.isFinite(points) || points < 0) return;
      state.actions.push({ id: cryptoId(), name, points });
      saveState();
      el.newActionName.value = '';
      el.newActionPoints.value = '';
      renderAll();
      showFlash('加点項目を追加');
    }

    function updateAction(id, patch) {
      const action = state.actions.find(item => item.id === id);
      if (!action) return;
      if (typeof patch.name === 'string') {
        action.name = patch.name.trim() || action.name;
      }
      if (Number.isFinite(patch.points)) {
        action.points = Math.max(0, patch.points);
      }
      saveState();
      renderAll();
    }

    function deleteAction(id) {
      state.actions = state.actions.filter(item => item.id !== id);
      saveState();
      renderAll();
      showFlash('加点項目を削除');
    }

    function addNewReward() {
      const name = el.newRewardName.value.trim();
      const cost = Number(el.newRewardCost.value);
      const limit = el.newRewardLimit.value === 'weekly' ? 'weekly' : 'none';
      const note = el.newRewardNote.value.trim();
      if (!name || !Number.isFinite(cost) || cost < 0) return;
      state.rewards.push({ id: cryptoId(), name, cost, limit, note });
      saveState();
      el.newRewardName.value = '';
      el.newRewardCost.value = '';
      el.newRewardLimit.value = 'none';
      el.newRewardNote.value = '';
      renderAll();
      showFlash('報酬項目を追加');
    }

    function updateReward(id, patch) {
      const reward = state.rewards.find(item => item.id === id);
      if (!reward) return;
      if (typeof patch.name === 'string') reward.name = patch.name.trim() || reward.name;
      if (Number.isFinite(patch.cost)) reward.cost = Math.max(0, patch.cost);
      if (patch.limit === 'weekly' || patch.limit === 'none') reward.limit = patch.limit;
      if (typeof patch.note === 'string') reward.note = patch.note;
      saveState();
      renderAll();
    }

    function deleteReward(id) {
      state.rewards = state.rewards.filter(item => item.id !== id);
      saveState();
      renderAll();
      showFlash('報酬項目を削除');
    }

    function saveNewPin() {
      const pin = String(el.newPinInput.value).trim();
      const confirm = String(el.confirmPinInput.value).trim();
      if (!/^\d{4}$/.test(pin)) {
        alert('PINは半角数字4桁で入力してください');
        return;
      }
      if (pin !== confirm) {
        alert('確認用PINが一致しません');
        return;
      }
      state.pin = pin;
      saveState();
      el.newPinInput.value = '';
      el.confirmPinInput.value = '';
      showFlash('PINを変更');
    }

    function exportBackup() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'family-points-backup.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importBackup(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(String(reader.result));
          state = normalizeState(imported);
          state.childName = '伊織';
          saveState();
          renderAll();
          showScreen('main');
          showFlash('読込完了');
        } catch (e) {
          alert('バックアップ読込に失敗しました');
        } finally {
          el.importFile.value = '';
        }
      };
      reader.readAsText(file);
    }
function resetAllData() {
  if (!confirm('本当に全部初期化しますか？')) return;
  if (!confirm('ポイント・履歴・報酬・加点項目・PINが全部消えます。続けますか？')) return;

  state = structuredClone(defaultData);
  state.childName = '伊織';

  saveState();
  lastRedeemedReward = null;
  pendingRewardId = null;
  enteredPin = '';

  renderAll();
  showScreen('main');
  showFlash('全部初期化しました');
}
    function trimHistory() {
      if (state.history.length > 200) state.history = state.history.slice(0, 200);
    }

    function showFlash(text) {
      el.flashText.textContent = text;
      el.flash.classList.add('show');
      setTimeout(() => el.flash.classList.remove('show'), 850);
    }

    function formatDate(iso) {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    function cryptoId() {
      return `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function escapeAttribute(str) {
      return escapeHtml(str);
    }

    function cssEscape(str) {
      if (window.CSS && typeof window.CSS.escape === 'function') return window.CSS.escape(str);
      return String(str).replace(/"/g, '\\"');
    }
  </script>
